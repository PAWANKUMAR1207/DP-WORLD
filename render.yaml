# Render Blueprint for GhostShip Application

services:
  # 1. PostgreSQL Database
  # Render's Blueprint parser seems to be inconsistent.
  # Using 'psql' as the type for a PostgreSQL database.
  - name: ghostship-db
    type: psql
    plan: free
    region: ohio

  # 2. Backend API (Flask)
  - name: ghostship-api
    type: web
    runtime: python
    region: ohio
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn --worker-class gevent --workers 1 --bind 0.0.0.0:8000 ghostship.api:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: ghostship-db
          property: connectionString
      - key: WEB_CONCURRENCY
        value: 2
    healthCheck:
      path: /api/health
      initialDelaySeconds: 30

  # 3. Frontend (React Static Site)
  - name: ghostship-frontend
    type: static
    region: ohio
    plan: free
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ghostship-api
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
