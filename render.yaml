# Render Blueprint
# Defines the services that make up the GhostShip application.
# 1. A PostgreSQL database for the officer profile.
# 2. A Python (Flask) backend API.
# 3. A React frontend static site.
#
# Find this file in your repo's root directory and connect it to Render
# to deploy all services at once.

services:
  # 1. PostgreSQL Database
  - name: ghostship-db
    type: psql
    # plan: free # optional (defaults to free)
    # See available regions: https://render.com/docs/deploys#regions
    region: ohio

  # 2. Backend API (Flask)
  - name: ghostship-api
    type: web
    runtime: python
    region: ohio
    # plan: free # optional
    buildCommand: "pip install -r requirements.txt"
    # Command to start the Flask app with Gunicorn
    # The module is `ghostship.api` and the Flask app instance is `app`
    startCommand: "gunicorn --worker-class gevent --workers 1 --bind 0.0.0.0:8000 ghostship.api:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0 # Specify a Python version
      - key: DATABASE_URL
        fromDatabase:
          name: ghostship-db
          property: connectionString # Injects the connection string from the DB service
      - key: WEB_CONCURRENCY # Number of Gunicorn workers
        value: 2

    healthCheck:
      path: /api/health
      initialDelaySeconds: 30

  # 3. Frontend (React Static Site)
  - name: ghostship-frontend
    type: static
    region: ohio
    # plan: free # optional
    # Tell Render to build from the 'frontend' subdirectory
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    # The build command creates the 'dist' folder in the 'frontend' directory
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ghostship-api
          property: url # Injects the public URL of the backend API
    # Optional: Add rewrite rules for client-side routing
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
