# Render Blueprint
# Defines the services that make up the GhostShip application.
# 1. A PostgreSQL database for the officer profile.
# 2. A Python (Flask) backend API.
# 3. A React frontend static site.

# 1. PostgreSQL Database Definition
databases:
  - name: ghostship-db
    # plan: free # optional (defaults to free)
    region: ohio

# 2. Application Services
services:
  # Backend API (Flask)
  - name: ghostship-api
    type: web
    runtime: python
    region: ohio
    # plan: free # optional
    buildCommand: "pip install -r requirements.txt"
    # Command to start the Flask app with Gunicorn
    startCommand: "gunicorn --worker-class gevent --workers 1 --bind 0.0.0.0:8000 ghostship.api:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0 # Specify a Python version
      - key: DATABASE_URL
        fromDatabase:
          name: ghostship-db
          property: connectionString # Injects the connection string from the DB service
      - key: WEB_CONCURRENCY # Number of Gunicorn workers
        value: 2
    healthCheck:
      path: /api/health
      initialDelaySeconds: 30

  # Frontend (React Static Site)
  - name: ghostship-frontend
    type: static
    region: ohio
    # plan: free # optional
    # Tell Render to build from the 'frontend' subdirectory
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    # The build command creates the 'dist' folder in the 'frontend' directory
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ghostship-api
          property: url # Injects the public URL of the backend API
    # Optional: Add rewrite rules for client-side routing
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

